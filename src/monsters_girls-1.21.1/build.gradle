plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT' apply false
    id 'net.neoforged.moddev' version '2.0.73' apply false
}

subprojects {
    apply plugin: 'java'
    
    java.toolchain.languageVersion = JavaLanguageVersion.of(21)

    jar {
        manifest {
            attributes([
                "Specification-Title": "${mod_id}",
                "Specification-Vendor": "${mod_authors}",
                "Specification-Version": "1",
                "Implementation-Title": "${mod_name}",
                "Implementation-Version": "${mod_version}",
                "Implementation-Vendor": "${mod_authors}",
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
            ])
        }
    }

    repositories {
        mavenCentral()
        
        maven {
            name = 'GeckoLib'
            url = 'https://dl.cloudsmith.io/public/geckolib3/geckolib/maven/'
        }
        
        maven {
            url "https://cursemaven.com"
            content {
                includeGroup "curse.maven"
            }
        }

        // HZ Lib dependency (if needed)
        if (project.hasProperty('depends_on_hzlib') && depends_on_hzlib.toBoolean()) {
            // Development fallback: HZLib per-loader build output
            if (project.hasProperty('hzlib_project_path')) {
                def hzlibBase = rootProject.file(project.hzlib_project_path)
                flatDir {
                    dirs new File(hzlibBase, 'Common/build/libs')
                    dirs new File(hzlibBase, 'Fabric/build/libs')
                    dirs new File(hzlibBase, 'Forge/build/libs')
                    dirs new File(hzlibBase, 'NeoForge/build/libs')
                }
            }
        }
    }

    tasks.withType(JavaCompile).configureEach {
        it.options.encoding = 'UTF-8'
        it.options.release = 21
    }

    tasks.withType(GenerateModuleMetadata) {
        enabled = false
    }
    
    java {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }
}